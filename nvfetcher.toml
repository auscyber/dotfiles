# nvfetcher.toml
[game-devices-udev-rules]
src.manual = "main"
fetch.tarball = "https://github.com/fabiscafe/game-devices-udev/archive/main.tar.gz"
# Compute outputHashes for git dependencies in cargo lock
[kanata]
src.github = "jtroo/kanata"
fetch.github = "jtroo/kanata"
cargo_lock = ["Cargo.lock"]
[cursor_shader]
src.git = "https://github.com/Crackerfracks/synesthaxia.glsl"
src.branch = "main"
fetch.git = "https://github.com/Crackerfracks/synesthaxia.glsl"
[yabai]
src.git = "https://github.com/koekeishiya/yabai"
src.git_branch = "main"
fetch.git = "https://github.com/koekeishiya/yabai"
[jankyborders]
src.git = "https://github.com/felixkratz/jankyborders"
fetch.git = "https://github.com/felixkratz/jankyborders"
[slskd]
src.git = "https://github.com/slskd/slskd.git"
fetch.git = "https://github.com/slskd/slskd.git"
extract = ["./src/web/package-lock.json"]
[slskd.prefetch]
prefetch-npm-deps = ["./src/web/package-lock.json"]
[icon_map]
src.github = "kvndrsslr/sketchybar-app-font"
fetch.url = "https://github.com/kvndrsslr/sketchybar-app-font/releases/download/$ver/icon_map.sh"
[ghostty]
src.manual = "tip"
fetch.github = "ghostty-org/ghostty"
[helium_macos]
src.github = "imputnet/helium-macos"
fetch.url = "https://github.com/imputnet/helium-macos/releases/download/$ver/helium_$ver_arm64-macos.dmg"
[helium_linux]
src.github = "imputnet/helium-linux"
fetch.tarball = "https://github.com/imputnet/helium-linux/releases/download/$ver/helium-$ver-x86_64_linux.tar.xz"
[proton-ge-bin]
src.github = "gloriouseggroll/proton-ge-custom"
fetch.tarball = "https://github.com/GloriousEggroll/proton-ge-custom/releases/download/$ver/$ver.tar.gz"
[deadlock-mod-manager]
src.github = "deadlock-mod-manager/deadlock-mod-manager"
fetch.url = "https://github.com/deadlock-mod-manager/deadlock-mod-manager/releases/download/$ver/deadlock-mod-manager.flatpak"
[sketchybar]
src.github = "felixkratz/sketchybar"
fetch.github = "felixkratz/sketchybar"
[eagle-nvim]
src.git =   "https://github.com/soulis-1256/eagle.nvim.git"
src.git_branch = "main"
fetch.github = "soulis-1256/eagle.nvim"
[jujutsu-nvim]
src.git = "https://github.com/yannvanhalewyn/jujutsu.nvim.git"
src.git_branch = "main"
fetch.github = "yannvanhalewyn/jujutsu.nvim"
[difftastic-nvim]
src.git = "https://github.com/clabby/difftastic.nvim.git"
src.git_branch = "main"
cargo_lock = ["Cargo.lock"]
fetch.github = "clabby/difftastic.nvim"
[difftastic]
src.git = "https://github.com/wilfred/difftastic.git"
fetch.github = "wilfred/difftastic"
cargo_locl = ["Cargo.lock"]
[cotabby-bin]
src.github = "fujacob/cotabby"
fetch.url = "https://github.com/fujacob/cotabby/releases/download/$ver/Cotabby.dmg"
[cotabby]
src.github = "fujacob/cotabby"
fetch.github = "fujacob/cotabby"
