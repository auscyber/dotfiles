name: "Build all systems"
on:
  push:
    branches:
      - main
      - master
  pull_request:
  workflow_dispatch:

# Dynamic matrix: the `matrix` job evaluates `.#ciMatrix.matrix` (nix-github-
# actions, from aspects/tooling/ci.nix) at run time, and `build` fans out one
# job per host from it. fail-fast: false -> one machine failing never stops the
# others. Both jobs `accept-flake-config`, so substituters + trusted-public-keys
# come from the flake's nixConfig (built from aspects/base/celler-keys.json) --
# nothing hardcoded here.
jobs:
  matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true
            fallback = true
            connect-timeout = 5
      - id: set
        run: |
          set -euo pipefail
          matrix="$(nix eval --json .#ciMatrix.matrix)"
          if [ -z "$matrix" ] || [ "$matrix" = "null" ]; then
            echo "::error::.#ciMatrix.matrix produced nothing — flake eval failed above" >&2
            exit 1
          fi
          echo "matrix=$matrix" >> "$GITHUB_OUTPUT"

  build:
    needs: matrix
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.matrix.outputs.matrix) }}
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true
            fallback = true
            connect-timeout = 5
      # Push what this job builds to celler. Skipped on pull_request — fork
      # PRs have no access to CELLER_TOKEN. Uses auscyber/celler-action (not
      # ryanccn/attic-action) because celler requires the NAR info to be sent
      # via an X-Celler-Nar-Info header, which the upstream attic client
      # doesn't send — pushes with it fail with "X-Celler-Nar-Info must be set".
      - name: Setup celler cache
        if: ${{ github.event_name != 'pull_request' }}
        uses: auscyber/celler-action@claude/celler-nar-info-header-irsrfq
        with:
          endpoint: https://cache.ivymect.in
          cache: main
          token: ${{ secrets.CELLER_TOKEN }}
      - name: Build ${{ matrix.name }}
        run: nix build --no-link --fallback --impure --print-out-paths ".#${{ matrix.attr }}"
