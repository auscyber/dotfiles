name: "Build one host"

on:
  workflow_call:
    inputs:
      name:
        required: true
        type: string
      os:
        required: true
        type: string
      attr:
        required: true
        type: string

jobs:
  build:
    name: ${{ inputs.name }}
    # inputs.os is JSON-encoded by the caller (systems.yml) because
    # nix-github-actions' matrix rows can have `os` as a list of runner
    # labels rather than a plain string -- workflow_call inputs are typed
    # `string` only, so a list value fails evaluation ("A sequence was not
    # expected") unless it's round-tripped through toJSON/fromJSON like this.
    runs-on: ${{ fromJSON(inputs.os) }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
      - uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            extra-substituters = https://cache.ivymect.in/main
            extra-trusted-substituters = https://cache.ivymect.in/main
            extra-trusted-public-keys = main:xS+QBlQtWPB/oX9un7feA68WGJRWfizG4C0YQUsmeN4=
            experimental-features = nix-command flakes pipe-operators
            accept-flake-config = true
            fallback = true
            connect-timeout = 5
      - uses: ./.github/actions/nix-cache
      # Push what this job builds to celler. Skipped on pull_request — fork
      # PRs have no access to CELLER_TOKEN. Uses auscyber/celler-action (not
      # ryanccn/attic-action) because celler requires the NAR info to be sent
      # via an X-Celler-Nar-Info header, which the upstream attic client
      # doesn't send — pushes with it fail with "X-Celler-Nar-Info must be set".
      # celler's client sends the X-Celler-Nar-Info header the server requires;
      # attic-action's attic client only sends X-Attic-Nar-Info, hence the push
      # failures. Pinned to the celler rev in flake.lock.
      #
      # flake-ref: ".#celler" -- NOT inputs-from: "." -- so this installs the
      # exact same installable (`.#celler`) that celler-<system> already built
      # and verified is in the cache via ensure-celler. `inputs-from: "."`
      # instead runs `nix profile install --inputs-from . celler#celler`,
      # which resolves through the flake registry rather than evaluating our
      # flake's `.#celler` attribute directly -- in practice that produced a
      # different derivation than `.#celler.outPath`, so this install kept
      # missing the cache and rebuilding celler (including its aws-sdk-s3 /
      # aws-config Rust deps) from source on every host job. Pinned to the
      # claude/celler-flake-ref-rt3xlu branch because the flake-ref input
      # (PR auscyber/celler-action#2) hasn't merged to @main yet -- switch
      # this to @main once that lands.
      - name: Setup celler cache
        if: ${{ github.event_name != 'pull_request' }}
        uses: auscyber/celler-action@claude/celler-flake-ref-rt3xlu
        with:
          endpoint: https://cache.ivymect.in
          cache: main
          token: ${{ secrets.CELLER_TOKEN }}
          flake-ref: ".#celler"
      - name: Build ${{ inputs.name }}
        run: nix build --no-link --fallback --impure --print-out-paths ".#${{ inputs.attr }}" | tee "$RUNNER_TEMP/out-paths"
