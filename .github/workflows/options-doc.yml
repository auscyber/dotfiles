name: "Generate documentation"
on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:
jobs:
  docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
      - name: Install nix
        uses: cachix/install-nix-action@v31
        with:
          github_access_token: ${{ secrets.GITHUB_TOKEN }}
          extra_nix_config: |
            experimental-features = nix-command flakes pipe-operators
      - name: Setup cachix
        uses: cachix/cachix-action@v15
        with:
          name: auscyber
          signingKey: '${{ secrets.CACHIX_SIGNING_KEY }}'
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
      # Docs generation is aspects/docs' `apps.docs` (README.md from the
      # mustache template + per-host diagrams under screenshots/diagrams/) --
      # this workflow used to build now-removed options-doc/options-doc-nixos/
      # options-doc-darwin packages, which no longer exist anywhere in the
      # flake (docs moved to this diagram-based generator instead).
      - name: Generate docs
        run: nix run .#docs
      - name: Commit updated documentation
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add README.md screenshots/diagrams
          git diff --cached --quiet || git commit -m "docs: update generated documentation"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
